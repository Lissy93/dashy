---
# Page meta info, like heading, footer text and nav links
pageInfo:
  title: Dashy
  description: Welcome to your new dashboard!
  navLinks:
  - title: GitHub
    path: https://github.com/Lissy93/dashy
  - title: Documentation
    path: https://dashy.to/docs

# Optional app settings and configuration
appConfig:
  theme: colorful

# Main content - An array of sections, each containing an array of items
sections:
  - name: Getting Started
    icon: fas fa-rocket
    items:
      - title: GitHub
        description: Source Code, Issues and Pull Requests
        url: https://github.com/lissy93/dashy
        icon: si-github
      - title: Docs
        description: Configuring & Usage Documentation
        provider: Dashy.to
        icon: far fa-book
        url: https://dashy.to/docs

  - name: Support Dashy
    icon: fas fa-heart
    displayData:
      itemSize: large
    widgets:
      - type: image
        label: Dashy is made possible thanks to our awesome sponsors
        options:
          imagePath: https://readme-contribs.as93.net/sponsors/lissy93?perRow=5&shape=squircle
    items:
      - title: Sponsor
        url: https://github.com/sponsors/lissy93
        description: Sponsor @Lissy93 on GitHub to support with ongoing development of Dashy
        icon: 🩷
        color: '#ff78d1'
        backgroundColor: '#c30c844a'

  - name: Latest Updates
    icon: fas fa-code-branch
    displayData:
      cols: 1
      rows: 3
      cutToHeight: true
    widgets:
      - type: rss-feed
        options:
          rssUrl: https://github.com/lissy93/dashy/releases.atom
          limit: 5
